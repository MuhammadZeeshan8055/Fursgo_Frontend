<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        /* calendar */
        .calendar {
            width: auto;
            background: #fff;
            border-radius: 20px;
        }

        /* Header */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            margin-bottom: 15px;
            border-radius: 100px;
            background: #F7F7F7;
            padding: 8px;
        }

        .calendar-header span {
            color: #3B3731;
            text-align: center;
            font-family: Lato;
            font-size: 18px;
            font-weight: 600;
            /* 333.333% */
        }

        .nav-btn {
            background: #fff;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Weekdays */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 16px;
            font-family: Lato;
            font-weight: 600;
            color: #9C9790;
            margin-bottom: 10px;
        }

        /* Dates */
        .dates {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
        }

        .date {
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            color: #3B3731;
            border-radius: 10px;
            background: #F7F7F7;
        }

        .date.available {
            background: #e9f3d9;
        }

        .date.selected {
            border-radius: 10px;
            border: 1px solid #91A36C;
            background: #D8E8B7;
            box-shadow: 0 5px 8px 0 rgba(0, 0, 0, 0.20);
        }

        /* Availability */
        .availability {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 20px 0 10px;
            color: #BACF8E;
            font-family: Lato;
            font-size: 18px;
            font-weight: 600;
        }

        /* Time slots */
        .times {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .time {
            padding: 8px 14px;
            border: 1px solid #C9DDA0;
            border-radius: 20px;
            cursor: pointer;
            color: #BACF8E;
            text-align: center;
            font-family: Lato;
            font-size: 14px;
            font-weight: 500;
        }

        .time.selected {
            border-radius: 68px;
            border: 1px solid #C9DDA0;
            background: #C9DDA0;
            color: #fff;
            box-shadow: 0 4px 4px 0 rgba(0, 0, 0, 0.05);
        }

        /* Button */
        .book-btn-div {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .book-btn {
            margin-top: 20px;
            padding: 10px 75px;
            background: #FFC97A;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: #FFF;
            text-align: center;
            font-family: Lato;
            font-size: 18px;
            font-weight: 600;
        }

        .last-booked {
            text-align: center;
            color: #9D9B98;
            margin-top: 8px;
            font-family: Lato;
            font-size: 14px;
            font-style: normal;
            font-weight: 500;
            line-height: normal;
        }

        .note {
            display: flex;
            gap: 18px;
            padding: 2px 20px;
            margin-top: 15px;
            border-radius: 10px;
            background: #FFF;
            box-shadow: 0 5px 55px 0 rgba(0, 0, 0, 0.05);
            color: #3B3731;
            font-family: Lato;
            font-size: 16px;
            font-weight: 500;
            align-items: center;
        }

        /* calendar */
    </style>
</head>

<body>
    <div class="calendar mt-4">
        <div class="calendar-header">
            <button class="nav-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="7" height="11" viewBox="0 0 7 11" fill="none">
                    <path d="M5.53426 10.484L0.499999 5.44975L5.44975 0.500005" stroke="#3B3731" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <span>October 2025</span>
            <button class="nav-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="7" height="11" viewBox="0 0 7 11" fill="none">
                    <path d="M0.5 10.484L5.53426 5.44975L0.58451 0.500005" stroke="#3B3731" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
        </div>

        <div class="weekdays mt-4">
            <div>M</div>
            <div>T</div>
            <div>W</div>
            <div>T</div>
            <div>F</div>
            <div>S</div>
            <div>S</div>
        </div>

        <div class="dates mt-4">
            <div></div>
            <div></div>
            <div class="date">1</div>
            <div class="date">2</div>
            <div class="date">3</div>
            <div class="date">4</div>

            <div class="date">5</div>
            <div class="date">6</div>
            <div class="date">7</div>
            <div class="date">8</div>
            <div class="date">9</div>
            <div class="date">10</div>
            <div class="date">11</div>

            <div class="date">12</div>
            <div class="date">13</div>
            <div class="date available selected">14</div>
            <div class="date">15</div>
            <div class="date">16</div>
            <div class="date">17</div>
            <div class="date">18</div>

            <div class="date">19</div>
            <div class="date">20</div>
            <div class="date">21</div>
            <div class="date">22</div>
            <div class="date">23</div>
            <div class="date">24</div>
            <div class="date">25</div>

            <div class="date">26</div>
            <div class="date">27</div>
            <div class="date">28</div>
            <div class="date">29</div>
            <div class="date">30</div>
            <div class="date">31</div>
        </div>

        <div class="availability mt-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path
                    d="M9 0C4.05 0 0 4.05 0 9C0 13.95 4.05 18 9 18C13.95 18 18 13.95 18 9C18 4.05 13.95 0 9 0ZM7.2 13.5L2.7 9L3.969 7.731L7.2 10.953L14.031 4.122L15.3 5.4L7.2 13.5Z"
                    fill="#D8E8B7" />
            </svg>
            Availability
        </div>

        <div class="space times mt-4">
            <div class="time">09:00 AM</div>
            <div class="time selected">11:00 AM</div>
            <div class="time">12:00 PM</div>
            <div class="time" id="halfDay">Half Day</div>
            <div class="time" id="fullDay">Full-Day</div>
        </div>

    </div>
    <script>
        // calendar
        const monthNames = [
            "January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];

        let currentDate = new Date(2025, 9); // October 2025

        const headerTitle = document.querySelector('.calendar-header span');
        const datesContainer = document.querySelector('.dates');
        const prevBtn = document.querySelector('.nav-btn:first-child');
        const nextBtn = document.querySelector('.nav-btn:last-child');

        // Example available dates (can come from backend later)
        const availableDates = [
            "2025-10-07",
            "2025-10-09",
            "2025-10-14",
            "2025-10-15",
            "2025-10-20",
            "2025-10-26",
            "2025-10-29",
            "2025-10-30"
        ];

        function renderCalendar() {
            datesContainer.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            headerTitle.textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay() || 7;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 1; i < firstDay; i++) {
                datesContainer.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateDiv = document.createElement('div');
                dateDiv.classList.add('date');
                dateDiv.textContent = day;

                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

                if (availableDates.includes(dateKey)) {
                    dateDiv.classList.add('available');

                    dateDiv.addEventListener('click', () => {
                        document.querySelectorAll('.date').forEach(d => d.classList.remove('selected'));
                        dateDiv.classList.add('selected');
                    });
                }

                datesContainer.appendChild(dateDiv);
            }
        }

        prevBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        nextBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        // Time selection (unchanged)
        document.querySelectorAll('.time').forEach(time => {
            time.addEventListener('click', () => {
                document.querySelectorAll('.time').forEach(t => t.classList.remove('selected'));
                time.classList.add('selected');
            });
        });

        renderCalendar();
    </script>
</body>

</html>
