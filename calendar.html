<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Booking Calendar</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f6f7f5;
            display: flex;
            justify-content: center;
            padding: 30px;
        }

        .calendar {
            width: 340px;
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        /* Header */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .nav-btn {
            background: #f0f0f0;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Weekdays */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }

        /* Dates */
        .dates {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .date {
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }

        .date.available {
            background: #e9f3d9;
        }

        .date.selected {
            background: #b7db7a;
            color: #fff;
            font-weight: 600;
        }

        /* Availability */
        .availability {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #9dbd6a;
            font-size: 14px;
            margin: 20px 0 10px;
        }

        /* Time slots */
        .times {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .time {
            padding: 8px 14px;
            border: 1px solid #cfe3a1;
            border-radius: 20px;
            font-size: 13px;
            color: #7aa234;
            cursor: pointer;
        }

        .time.selected {
            background: #cfe3a1;
            color: #fff;
        }

        /* Button */
        .book-btn {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: #ffcc80;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
        }

        .last-booked {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        .note {
            display: flex;
            gap: 10px;
            font-size: 13px;
            color: #777;
            background: #fff7ec;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="calendar">
        <div class="calendar-header">
            <button class="nav-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="7" height="11" viewBox="0 0 7 11" fill="none">
                    <path d="M5.53426 10.484L0.499999 5.44975L5.44975 0.500005" stroke="#3B3731" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <span>October 2025</span>
            <button class="nav-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="7" height="11" viewBox="0 0 7 11" fill="none">
                    <path d="M0.5 10.484L5.53426 5.44975L0.58451 0.500005" stroke="#3B3731" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
        </div>

        <div class="weekdays">
            <div>M</div>
            <div>T</div>
            <div>W</div>
            <div>T</div>
            <div>F</div>
            <div>S</div>
            <div>S</div>
        </div>

        <div class="dates">
            <div></div>
            <div></div>
            <div class="date">1</div>
            <div class="date">2</div>
            <div class="date">3</div>
            <div class="date">4</div>

            <div class="date">5</div>
            <div class="date">6</div>
            <div class="date available">7</div>
            <div class="date">8</div>
            <div class="date available">9</div>
            <div class="date">10</div>
            <div class="date">11</div>

            <div class="date">12</div>
            <div class="date">13</div>
            <div class="date available selected">14</div>
            <div class="date available">15</div>
            <div class="date">16</div>
            <div class="date">17</div>
            <div class="date">18</div>

            <div class="date">19</div>
            <div class="date available">20</div>
            <div class="date">21</div>
            <div class="date">22</div>
            <div class="date">23</div>
            <div class="date">24</div>
            <div class="date">25</div>

            <div class="date available">26</div>
            <div class="date">27</div>
            <div class="date">28</div>
            <div class="date available">29</div>
            <div class="date available">30</div>
            <div class="date">31</div>
        </div>

        <div class="availability">
            ✔ Availability
        </div>

        <div class="times">
            <div class="time">09:00 AM</div>
            <div class="time">11:00 AM</div>
            <div class="time selected">12:00 PM</div>
            <div class="time">16:00 PM</div>
            <div class="time">20:00 PM</div>
        </div>

        <button class="book-btn">Book now</button>
        <div class="last-booked">⏱ Last booked 2 days ago</div>

        <div class="note">
            ⚠ Free cancellations up to 24 hours before appointment. Tools sanitised after every pet.
        </div>
    </div>

    <script>
        const monthNames = [
            "January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];

        let currentDate = new Date(2025, 9); // October 2025

        const headerTitle = document.querySelector('.calendar-header span');
        const datesContainer = document.querySelector('.dates');
        const prevBtn = document.querySelector('.nav-btn:first-child');
        const nextBtn = document.querySelector('.nav-btn:last-child');

        // Example available dates (can come from backend later)
        const availableDates = [7, 9, 14, 15, 20, 26, 29, 30];

        function renderCalendar() {
            datesContainer.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            headerTitle.textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay() || 7;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Empty cells before first date
            for (let i = 1; i < firstDay; i++) {
                datesContainer.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateDiv = document.createElement('div');
                dateDiv.classList.add('date');
                dateDiv.textContent = day;

                if (availableDates.includes(day)) {
                    dateDiv.classList.add('available');

                    dateDiv.addEventListener('click', () => {
                        document.querySelectorAll('.date').forEach(d => d.classList.remove('selected'));
                        dateDiv.classList.add('selected');
                    });
                }

                datesContainer.appendChild(dateDiv);
            }
        }

        prevBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        nextBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        // Time selection (unchanged)
        document.querySelectorAll('.time').forEach(time => {
            time.addEventListener('click', () => {
                document.querySelectorAll('.time').forEach(t => t.classList.remove('selected'));
                time.classList.add('selected');
            });
        });

        renderCalendar();
    </script>


</body>

</html>
